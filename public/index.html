<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KnowledgeMate - AI Knowledge Assistant</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-hover: #242836;
      --border: #2a2e3a;
      --text: #e4e4e7;
      --text-muted: #71717a;
      --accent: #f97316;
      --accent-hover: #fb923c;
      --user-bg: #1e3a5f;
      --assistant-bg: #1a1d27;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    header .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header .logo h1 {
      font-size: 1.25rem;
      font-weight: 600;
    }

    header .logo .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ef4444;
    }

    header .logo .dot.connected {
      background: #22c55e;
    }

    header .actions {
      display: flex;
      gap: 8px;
    }

    header button {
      background: var(--surface-hover);
      color: var(--text-muted);
      border: 1px solid var(--border);
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    header button:hover {
      color: var(--text);
      border-color: var(--text-muted);
    }

    /* ── Messages Area ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      gap: 12px;
    }

    .message .avatar {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: 600;
      flex-shrink: 0;
    }

    .message.user .avatar {
      background: var(--user-bg);
      color: #60a5fa;
    }

    .message.assistant .avatar {
      background: #2d1f0e;
      color: var(--accent);
    }

    .message .content {
      flex: 1;
      line-height: 1.6;
      font-size: 0.95rem;
    }

    .message .role-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
      color: var(--text-muted);
    }

    .message .content pre {
      background: #0d0f14;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      overflow-x: auto;
      margin: 8px 0;
      font-size: 0.85rem;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
    }

    .message .content code {
      background: #0d0f14;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.85em;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
    }

    .message .content pre code {
      background: none;
      padding: 0;
    }

    .message .content p { margin: 6px 0; }
    .message .content ul, .message .content ol { padding-left: 20px; margin: 6px 0; }
    .message .content li { margin: 4px 0; }
    .message .content strong { color: #fff; }

    /* ── Welcome Screen ── */
    #welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: var(--text-muted);
    }

    #welcome h2 {
      font-size: 1.5rem;
      color: var(--text);
    }

    #welcome p {
      max-width: 480px;
      text-align: center;
      line-height: 1.6;
    }

    #welcome .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
      justify-content: center;
    }

    #welcome .suggestions button {
      background: var(--surface);
      color: var(--text-muted);
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    #welcome .suggestions button:hover {
      color: var(--text);
      border-color: var(--accent);
    }

    /* ── Typing Indicator ── */
    .typing-indicator {
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      display: none;
      gap: 12px;
      align-items: center;
    }

    .typing-indicator.visible { display: flex; }

    .typing-dots {
      display: flex;
      gap: 4px;
    }

    .typing-dots span {
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: bounce 1.4s ease-in-out infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-8px); }
    }

    /* ── Input Area ── */
    #input-area {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    #input-area form {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      gap: 8px;
    }

    #input-area textarea {
      flex: 1;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 0.95rem;
      font-family: inherit;
      resize: none;
      outline: none;
      min-height: 48px;
      max-height: 160px;
      transition: border-color 0.15s;
    }

    #input-area textarea:focus {
      border-color: var(--accent);
    }

    #input-area textarea::placeholder {
      color: var(--text-muted);
    }

    #input-area button[type="submit"] {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 0 20px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    #input-area button[type="submit"]:hover {
      background: var(--accent-hover);
    }

    #input-area button[type="submit"]:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      header { padding: 12px 16px; }
      #messages { padding: 16px; }
      #input-area { padding: 12px 16px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="dot" id="status-dot"></div>
    <h1>KnowledgeMate</h1>
  </div>
  <div class="actions">
    <button id="clear-btn">Clear Chat</button>
  </div>
</header>

<div id="welcome">
  <h2>KnowledgeMate</h2>
  <p>Your AI-powered knowledge assistant. Ask me anything — I can help with coding, writing, research, brainstorming, and more.</p>
  <div class="suggestions">
    <button onclick="sendSuggestion('Explain how WebSockets work')">How do WebSockets work?</button>
    <button onclick="sendSuggestion('Help me write a Python function to sort a list')">Write a sort function</button>
    <button onclick="sendSuggestion('What are Cloudflare Workers?')">What are CF Workers?</button>
  </div>
</div>

<div id="messages" style="display:none;"></div>

<div class="typing-indicator" id="typing">
  <div class="typing-dots">
    <span></span><span></span><span></span>
  </div>
</div>

<div id="input-area">
  <form id="chat-form">
    <textarea
      id="user-input"
      placeholder="Type a message..."
      rows="1"
      autofocus
    ></textarea>
    <button type="submit" id="send-btn">Send</button>
  </form>
</div>

<script>
  // ── State ──
  let ws = null;
  let isStreaming = false;
  let currentAssistantEl = null;
  let currentAssistantText = "";
  const userId = localStorage.getItem("km_user_id") || (() => {
    const id = crypto.randomUUID();
    localStorage.setItem("km_user_id", id);
    return id;
  })();

  // ── DOM Elements ──
  const messagesEl = document.getElementById("messages");
  const welcomeEl = document.getElementById("welcome");
  const typingEl = document.getElementById("typing");
  const chatForm = document.getElementById("chat-form");
  const userInput = document.getElementById("user-input");
  const sendBtn = document.getElementById("send-btn");
  const statusDot = document.getElementById("status-dot");
  const clearBtn = document.getElementById("clear-btn");

  // ── WebSocket Connection ──
  function connect() {
    const protocol = location.protocol === "https:" ? "wss:" : "ws:";
    const wsUrl = `${protocol}//${location.host}/agents/KnowledgeAgent/${userId}`;
    ws = new WebSocket(wsUrl);

    ws.addEventListener("open", () => {
      statusDot.classList.add("connected");
    });

    ws.addEventListener("close", () => {
      statusDot.classList.remove("connected");
      // Reconnect after a short delay
      setTimeout(connect, 2000);
    });

    ws.addEventListener("error", () => {
      statusDot.classList.remove("connected");
    });

    ws.addEventListener("message", (event) => {
      let data;
      try { data = JSON.parse(event.data); } catch { return; }

      switch (data.type) {
        case "start":
          isStreaming = true;
          sendBtn.disabled = true;
          currentAssistantText = "";
          currentAssistantEl = addMessage("assistant", "");
          typingEl.classList.remove("visible");
          break;

        case "token":
          if (currentAssistantEl && data.content) {
            currentAssistantText += data.content;
            updateMessageContent(currentAssistantEl, currentAssistantText);
            scrollToBottom();
          }
          break;

        case "done":
          isStreaming = false;
          sendBtn.disabled = false;
          currentAssistantEl = null;
          userInput.focus();
          break;

        case "error":
          isStreaming = false;
          sendBtn.disabled = false;
          addMessage("assistant", `Error: ${data.content || "Something went wrong."}`);
          typingEl.classList.remove("visible");
          break;

        case "cleared":
          messagesEl.innerHTML = "";
          messagesEl.style.display = "none";
          welcomeEl.style.display = "flex";
          break;

        // Ignore agent internal state sync messages
        case "cf_agent_state":
          break;
      }
    });
  }

  // ── Message Rendering ──
  function addMessage(role, content) {
    welcomeEl.style.display = "none";
    messagesEl.style.display = "flex";

    const div = document.createElement("div");
    div.className = `message ${role}`;

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = role === "user" ? "U" : "AI";

    const body = document.createElement("div");
    body.className = "content";

    const label = document.createElement("div");
    label.className = "role-label";
    label.textContent = role === "user" ? "You" : "KnowledgeMate";

    const contentEl = document.createElement("div");
    contentEl.innerHTML = renderMarkdown(content);

    body.appendChild(label);
    body.appendChild(contentEl);

    div.appendChild(avatar);
    div.appendChild(body);

    messagesEl.appendChild(div);
    scrollToBottom();

    return contentEl;
  }

  function updateMessageContent(el, text) {
    el.innerHTML = renderMarkdown(text);
  }

  // ── Simple Markdown Renderer ──
  function renderMarkdown(text) {
    if (!text) return "";

    let html = escapeHtml(text);

    // Code blocks (```...```)
    html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
      return `<pre><code>${code.trim()}</code></pre>`;
    });

    // Inline code
    html = html.replace(/`([^`]+)`/g, "<code>$1</code>");

    // Bold
    html = html.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");

    // Italic
    html = html.replace(/\*([^*]+)\*/g, "<em>$1</em>");

    // Unordered lists
    html = html.replace(/^- (.+)$/gm, "<li>$1</li>");
    html = html.replace(/(<li>.*<\/li>\n?)+/g, "<ul>$&</ul>");

    // Ordered lists
    html = html.replace(/^\d+\. (.+)$/gm, "<li>$1</li>");

    // Headers
    html = html.replace(/^### (.+)$/gm, "<h4>$1</h4>");
    html = html.replace(/^## (.+)$/gm, "<h3>$1</h3>");
    html = html.replace(/^# (.+)$/gm, "<h2>$1</h2>");

    // Paragraphs (double newline)
    html = html.replace(/\n\n/g, "</p><p>");
    html = "<p>" + html + "</p>";

    // Single newlines to <br> (within paragraphs)
    html = html.replace(/\n/g, "<br>");

    // Clean up empty paragraphs
    html = html.replace(/<p><\/p>/g, "");
    html = html.replace(/<p>(<h[234]>)/g, "$1");
    html = html.replace(/(<\/h[234]>)<\/p>/g, "$1");
    html = html.replace(/<p>(<pre>)/g, "$1");
    html = html.replace(/(<\/pre>)<\/p>/g, "$1");
    html = html.replace(/<p>(<ul>)/g, "$1");
    html = html.replace(/(<\/ul>)<\/p>/g, "$1");

    return html;
  }

  function escapeHtml(text) {
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // ── Send Message ──
  function sendMessage(text) {
    if (!text.trim() || isStreaming || !ws || ws.readyState !== WebSocket.OPEN) return;

    addMessage("user", text);
    typingEl.classList.add("visible");
    scrollToBottom();

    ws.send(JSON.stringify({ type: "chat", content: text }));
    userInput.value = "";
    autoResize();
  }

  function sendSuggestion(text) {
    sendMessage(text);
  }

  // ── Event Listeners ──
  chatForm.addEventListener("submit", (e) => {
    e.preventDefault();
    sendMessage(userInput.value);
  });

  userInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage(userInput.value);
    }
  });

  clearBtn.addEventListener("click", () => {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: "clear" }));
    }
  });

  // Auto-resize textarea
  function autoResize() {
    userInput.style.height = "auto";
    userInput.style.height = Math.min(userInput.scrollHeight, 160) + "px";
  }
  userInput.addEventListener("input", autoResize);

  // ── Initialize ──
  connect();
</script>

</body>
</html>
